  <style>
    #splash-screen-v2 {
      position: fixed;
      inset: 0;
      background: #E8FF3A;
      z-index: 9999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
    }
    .splash-box {
      width: 100px;
      height: 100px;
      background: #111111;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      animation: splash-pulse 2s infinite ease-in-out;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .splash-text {
      margin-top: 24px;
      font-family: sans-serif;
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #111111;
      font-size: 10px;
      text-transform: uppercase;
    }
    body.app-ready #splash-screen-v2 {
      opacity: 0;
      visibility: hidden;
    }
  </style>
